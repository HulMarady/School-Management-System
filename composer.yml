services:
  web:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: school-management-web
    working_dir: /src
    volumes:
      - ./:/src
      - nuget_cache:/root/.nuget/packages
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: server=db;port=3306;database=school_database;user=root;password=rootpass;TreatTinyAsBoolean=false;Allow User Variables=True;
    command: sh -c "dotnet restore && dotnet run --urls http://0.0.0.0:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: school-management-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: school_database
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db_data:
  nuget_cache: